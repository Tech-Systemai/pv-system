/* ===== TABS ===== */

}

/* ===== ACTIVITY FEED ===== */
.pv-feed-item {

}

}

}
.pv-feed-text { flex: 1; font-size: 12px; color: #4a5568; }
.pv-feed-text strong { color: #1a1f2e; font-weight: 600; }

/* ===== BARS ===== */
.pv-bar-wrap {
  height: 6px; background: #f0f2f5; border-radius: 3px;
  overflow: hidden;
}
.pv-bar-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.3s;
}

/* ===== MODAL ===== */
.pv-modal-bg {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; animation: fadein 0.15s;
}
.pv-modal {
  background: #fff; border-radius: 14px;
  padding: 26px; width: 480px; max-width: 100%;
  max-height: 80vh; overflow-y: auto;
  box-shadow: 0 25px 60px rgba(15, 23, 42, 0.25);
}
.pv-modal-title {
  font-size: 18px; font-weight: 700; color: #1a1f2e;
  margin-bottom: 18px; letter-spacing: -0.015em;
  padding-bottom: 14px; border-bottom: 1px solid #f0f2f5;
}

/* ===== TOAST ===== */
.pv-toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 2000;
  background: #1a1f2e; color: #fff;
  padding: 11px 18px; border-radius: 9px;
  font-size: 12px; font-weight: 500;
  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.3);
  animation: slideup 0.2s;
}
@keyframes slideup { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.pv-screen {

  font-size: 11px; color: #9fa8be; position: relative; overflow: hidden;
}
.pv-screen::before {
  content: ""; position: absolute; top: 8px; left: 8px;
  width: 7px; height: 7px; border-radius: 50%; background: #ef4444;
  animation: pulse 1.5s infinite;
  box-shadow: 0 0 8px #ef4444;
}
.pv-screen::after {
  content: "REC"; position: absolute; top: 5px; left: 22px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: #ef4444; font-weight: 600; letter-spacing: 0.1em;
}

/* ===== FOOTER ===== */

}
.pv-footer-item { display: flex; align-items: center; gap: 6px; }
.pv-footer-version { margin-left: auto; font-family: 'JetBrains Mono', monospace; color: #9fa8be; }

}

}

.pv-policy-name { font-size: 13px; font-weight: 600; color: #1a1f2e; margin-bottom: 4px; }
.pv-policy-detail { font-size: 11px; color: #6b7689; line-height: 1.5; }
.pv-policy-detail strong { color: #4f46e5; font-weight: 600; }

  transition: all 0.1s;
}

.pv-att-cell.present { background: #d1fae5; color: #047857; }
.pv-att-cell.late { background: #fef3c7; color: #b45309; }

function startLiveFeed(){
  if(liveFeedTimer)clearInterval(liveFeedTimer);
  liveFeedTimer=setInterval(()=>{
    const events=[
      {user:'Ahmed Hassan',action:'Logged revenue $'+(Math.floor(Math.random()*1500)+300),type:'green'},
      {user:'Maria Santos',action:'Logged collection $'+(Math.floor(Math.random()*800)+200),type:'green'},

      {user:'Lena Müller',action:'Submitted coaching report',type:'indigo'},
      {user:'System',action:'-0.5 pts auto-deducted (late policy)',type:'red'},
    ];
    const ev={...events[Math.floor(Math.random()*events.length)],time:'Just now'};
    DB.liveFeed.unshift(ev);
    DB.liveFeed=DB.liveFeed.slice(0,12);
    const el=document.getElementById('pv-live-feed');

  },4000);
}
