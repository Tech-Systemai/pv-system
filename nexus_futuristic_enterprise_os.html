.toast {

}
.toast::before { content: "▸ "; color: #00dcff; }
@keyframes slidein { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

}
.screen-view::before {
  content: ""; position: absolute; top: 8px; left: 8px; width: 8px; height: 8px;

    return;

  DB.currentUser=found;
  currentNav=PORTALS[found.role]?.sections[0].items[0].id || 'dashboard';
  renderApp();
}

      {user:'Maria Santos',action:'Logged collection $'+(Math.floor(Math.random()*800)+200),type:'green'},
